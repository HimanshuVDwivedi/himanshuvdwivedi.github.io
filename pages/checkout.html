<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — AS Collections</title>
  <meta name="robots" content="noindex" />

  <link rel="preload" href="/assets/fonts/fraunces-opsz.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/assets/fonts/plus-jakarta-wght.woff2" as="font" type="font/woff2" crossorigin />

  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/button.css" />
  <link rel="stylesheet" href="/css/components/checkout.css" />
</head>
<body>
  <a class="skip-link" href="#checkout-main">Skip to content</a>

  <!-- Minimal header: brand + secure badge, NO nav (reduce leak points) -->
  <header class="checkout-header">
    <div class="container checkout-header__inner">
      <a href="/" class="brand">AS Collections</a>
      <span class="checkout-header__secure">Secure checkout</span>
    </div>
  </header>

  <main>
    <div class="container" id="checkout-main">
      <div class="checkout">
        <!-- FORM (built by checkout.js) -->
        <form id="checkout-form" novalidate></form>

        <!-- ORDER SUMMARY -->
        <aside class="summary" aria-label="Order summary">
          <h2>Order summary</h2>
          <div id="summary-lines"></div>
          <div class="sum-rows">
            <div class="sum-row"><span>Subtotal</span><span id="sum-subtotal"></span></div>
            <div class="sum-row sum-row--discount" id="sum-discount-row" hidden>
              <span>Discount <span class="sum-coupon-code" id="sum-coupon"></span></span><span id="sum-discount"></span>
            </div>
            <div class="sum-row"><span>Shipping</span><span id="sum-shipping"></span></div>
            <div class="sum-row sum-total"><span>Total</span><span id="sum-total"></span></div>
          </div>
          <button class="btn btn--primary btn--block pay-btn" id="pay-btn">Pay securely</button>
          <div class="checkout__trust">
            <span>Razorpay secured</span><span>30-day returns</span><span>925 silver</span>
          </div>
        </aside>
      </div>
    </div>

    <!-- Empty cart -->
    <div class="container checkout-empty" id="checkout-empty" hidden>
      <h1>Your cart is empty</h1>
      <p>Add a piece you love, then come back to check out.</p>
      <a class="btn btn--primary" href="/pages/shop.html">Shop now</a>
    </div>
  </main>

  <script type="module" src="/js/pages/checkout.js"></script>
</body>
</html>
